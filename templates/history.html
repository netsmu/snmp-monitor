{% extends "base.html" %}
{% block content %}
<h4>设备: {{ device.name or '未命名' }} ({{ device.ip }}) 历史趋势 (最近100次)</h4>
<div class="card shadow-sm mt-3">
    <div class="card-body">
        <!-- ECharts 容器 -->
        <div id="mainChart" style="width: 100%; height: 500px;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- 引入 ECharts  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.1/echarts.min.js"></script> -->
<script src="{{ url_for('static', filename='echarts.min.js') }}"></script>
<script>
    var chart = echarts.init(document.getElementById('mainChart'));
    
    fetch('/api/history/{{ device.id }}').then(res => res.json()).then(data => {
        var option = {
            tooltip: { trigger: 'axis' },
            legend: { data: ['CPU使用率', '内存使用率'] },
            xAxis: { type: 'category', data: data.times },
            yAxis: { type: 'value', max: 100 },
            series: [
                { name: 'CPU使用率', type: 'line', smooth: true, data: data.cpu, itemStyle: {color: '#dc3545'} },
                { name: '内存使用率', type: 'line', smooth: true, data: data.mem, itemStyle: {color: '#0dcaf0'} }
            ]
        };
        chart.setOption(option);
    });
</script>
{% endblock %}
